[build]
builder = "NIXPACKS"
buildCommand = "npm run build"

[deploy]
startCommand = "npm start"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[environment]
PORT = "3000"
NODE_ENV = "production"
NEXT_PUBLIC_APP_ENV = "production"

[networking]
serviceDomain = "app-factory-dashboard"